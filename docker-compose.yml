services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: objekt_trade
      MIRROR_POSTGRES_DB: ${MIRROR_POSTGRES_DB:-indexer_mirror}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d objekt_trade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # rembg: (disabled — Create Frame feature temporarily off)
  # rembg:
  #   image: danielgatis/rembg:latest
  #   restart: unless-stopped
  #   environment:
  #     U2NET_HOME: /models
  #     OMP_NUM_THREADS: "1"
  #   volumes:
  #     - rembg-models:/models
  #   ports:
  #     - "127.0.0.1:7000:7000"
  #   command:
  #     - s
  #     - --host
  #     - 0.0.0.0
  #     - --port
  #     - "7000"
  #     - --threads
  #     - "1"
  #     - --no-ui

  # Optional pgbouncer sidecar in front of the remote indexer. Its own
  # container means its own network namespace — isolating the fragile
  # internet-facing indexer connection from the app container's netns, so a
  # netns break on one side doesn't necessarily take down the other.
  # Disabled by default (profile-gated, not started by a plain `docker compose
  # up`). To cut over: fill in INDEXER_UPSTREAM_* below with the real remote
  # indexer's connection parts, then point INDEXER_DATABASE_URL at
  # postgres://<user>:<pass>@indexer-pgbouncer:5432/<db> and start with
  # `docker compose --profile indexer-bouncer up -d`.
  # Does NOT remove the remote network hop (only relocates it) — see
  # docs/plans/indexer-pgbouncer-sidecar.md for what this does and doesn't fix.
  indexer-pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    profiles: ["indexer-bouncer"]
    environment:
      DB_HOST: ${INDEXER_UPSTREAM_HOST:-}
      DB_PORT: ${INDEXER_UPSTREAM_PORT:-5432}
      DB_USER: ${INDEXER_UPSTREAM_USER:-}
      DB_PASSWORD: ${INDEXER_UPSTREAM_PASSWORD:-}
      DB_NAME: ${INDEXER_UPSTREAM_DB:-}
      # Transaction mode: the remote indexer is already behind its own
      # transaction-mode pooler (see the note in src/lib/db/indexer.ts about
      # it rejecting statement_timeout as a startup parameter), and nothing
      # in this app uses prepared statements, session SET, or LISTEN/NOTIFY
      # on the indexer connection, so pooling at the transaction level here
      # is safe.
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "8"
      MIN_POOL_SIZE: "2"
      RESERVE_POOL_SIZE: "2"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_TLS_SSLMODE: ${INDEXER_UPSTREAM_SSLMODE:-prefer}
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      SERVER_LIFETIME: "180"
      SERVER_IDLE_TIMEOUT: "60"
      # Fail fast instead of queueing indefinitely so a dead upstream surfaces
      # as an error the app's mirror circuit breaker / pool recycler can act
      # on, rather than a hang that looks like a slow query.
      QUERY_WAIT_TIMEOUT: "10"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # rembg:       (disabled — Create Frame feature temporarily off)
      # rembg:
      #   condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      COSMO_KEY: ${COSMO_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      INDEXER_DATABASE_URL: ${INDEXER_DATABASE_URL:-}
      MIRROR_DATABASE_URL: ${MIRROR_DATABASE_URL:-}
      # Diagnostic only — lets /api/health dial the real remote indexer
      # directly, independent of whatever INDEXER_DATABASE_URL points at, so
      # an outage can distinguish "app can't reach its configured indexer
      # target" from "app can't reach the remote at all." Not used for actual
      # queries. No-ops (indexerUpstreamTcp omitted) if unset.
      INDEXER_UPSTREAM_HOST: ${INDEXER_UPSTREAM_HOST:-}
      INDEXER_UPSTREAM_PORT: ${INDEXER_UPSTREAM_PORT:-}
      REMBG_SERVICE_URL: ${REMBG_SERVICE_URL:-http://rembg:7000}
      REMBG_MODEL: ${REMBG_MODEL:-u2net_human_seg}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-}
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      - "3000:3000"

  # Cron triggers:
  #   "0 2 * * *"   → /api/cron/expire-trades        (daily)
  #   "*/15 * * * *" → /api/cron/prune-stale-haves   (every 15 min)
  #   "*/10 * * * *" → /api/cron/check-trade-availability (every 10 min,
  #                   verifies open trades in small stale-first batches)
  #   "*/2 * * * *" → /api/cron/refresh-cosmo-token   (every 2 min, keeps the
  #                   Cosmo token chain alive so it never expires)
  #   "*/2 * * * *" → /api/cron/sync-indexer          (every 2 min, syncs the
  #                   local collection mirror; no-ops until MIRROR_DATABASE_URL
  #                   is set)
  # The app's Dockerfile healthcheck marks it unhealthy after ~2.5 min of
  # /api/health failures, but Docker never restarts unhealthy containers on
  # its own. This watcher does, with a 30-min cooldown so a persistent remote
  # outage degrades to a brief restart blip every half hour, not a loop.
  # A restart also resets the container's network namespace — the only remedy
  # when the container's path to the remote indexer breaks (health reports
  # indexerTcp: "unreachable").
  autoheal:
    image: docker:27-cli
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          status=$$(docker inspect -f '{{.State.Health.Status}}' objekt-trade-app-1 2>/dev/null || echo none)
          if [ "$$status" = "unhealthy" ]; then
            now=$$(date +%s); last=$$(cat /tmp/last-heal 2>/dev/null || echo 0)
            if [ $$((now-last)) -ge 1800 ]; then
              echo "$$(date -u '+%Y-%m-%dT%H:%M:%SZ') app unhealthy; restarting"
              docker restart objekt-trade-app-1 && echo "$$now" > /tmp/last-heal
            fi
          fi
          sleep 60
        done

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
      APP_URL: http://app:3000
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' | crontab -
        0 2 * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/expire-trades
        */15 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/prune-stale-haves
        */10 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/check-trade-availability
        */2 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/refresh-cosmo-token
        */2 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/sync-indexer
        EOF
        exec crond -f -l 2

volumes:
  pgdata:
  redisdata:
  rembg-models:
