services:
  postgres:
    image: postgres:16
    container_name: objekt-trade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: objekt_trade
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d objekt_trade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: objekt-trade-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # rembg: (disabled — Create Frame feature temporarily off)
  # rembg:
  #   image: danielgatis/rembg:latest
  #   container_name: objekt-trade-rembg
  #   restart: unless-stopped
  #   environment:
  #     U2NET_HOME: /models
  #     OMP_NUM_THREADS: "1"
  #   volumes:
  #     - rembg-models:/models
  #   ports:
  #     - "127.0.0.1:7000:7000"
  #   command:
  #     - s
  #     - --host
  #     - 0.0.0.0
  #     - --port
  #     - "7000"
  #     - --threads
  #     - "1"
  #     - --no-ui

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    container_name: objekt-trade-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # rembg:       (disabled — Create Frame feature temporarily off)
      # rembg:
      #   condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      INDEXER_DATABASE_URL: ${INDEXER_DATABASE_URL:-}
      REMBG_SERVICE_URL: ${REMBG_SERVICE_URL:-http://rembg:7000}
      REMBG_MODEL: ${REMBG_MODEL:-u2net_human_seg}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-}
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      - "3000:3000"

  # Cron replacement for vercel.json "0 2 * * *" → /api/cron/expire-trades
  cron:
    image: alpine:3.20
    container_name: objekt-trade-cron
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
      APP_URL: http://app:3000
    command: >
      sh -c "
        echo '0 2 * * * wget -qO- --header=\"Authorization: Bearer \$CRON_SECRET\" \$APP_URL/api/cron/expire-trades' | crontab - &&
        crond -f -l 2
      "

volumes:
  pgdata:
  redisdata:
  rembg-models:
