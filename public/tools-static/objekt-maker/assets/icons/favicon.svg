<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>

  <!-- Photo frame -->
  <rect x="25" y="20" width="50" height="60" fill="white" rx="2"/>

  <!-- Image placeholder -->
  <rect x="30" y="25" width="40" height="40" fill="#e2e8f0" rx="1"/>

  <!-- Sparkle -->
  <circle cx="75" cy="25" r="4" fill="white" opacity="0.9"/>
  <circle cx="82" cy="35" r="3" fill="white" opacity="0.7"/>
  <circle cx="72" cy="38" r="2.5" fill="white" opacity="0.8"/>
</svg>
