name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/objekt-trade
            git fetch origin
            git reset --hard origin/main
            docker ps -a \
              --filter "label=com.docker.compose.project=objekt-trade" \
              --format '{{.ID}} {{.Names}}' \
              | awk '$2 ~ /^[0-9a-f]{12}_objekt-trade-/ { print $1 }' \
              | xargs -r docker rm -f
            docker compose up -d --build --remove-orphans
