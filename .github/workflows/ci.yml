name: CI

on:
  pull_request:
    branches:
      - main
      - testing
  push:
    branches:
      - main
      - testing

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/objekt_trade?sslmode=disable
      INDEXER_DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/objekt_indexer?sslmode=disable
      REDIS_URL: redis://127.0.0.1:6379
      DISCORD_CLIENT_ID: ci
      DISCORD_CLIENT_SECRET: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
