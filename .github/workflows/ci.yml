name: CI

on:
  pull_request:
    branches:
      - main
      - testing
  push:
    branches:
      - main
      - testing

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: public.ecr.aws/docker/library/redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BETTER_AUTH_SECRET: ci-build-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/objekt_trade?sslmode=disable
      INDEXER_DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/objekt_indexer?sslmode=disable
      REDIS_URL: redis://127.0.0.1:6379
      DISCORD_CLIENT_ID: ci
      DISCORD_CLIENT_SECRET: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create CI databases
        run: |
          PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d postgres -c 'CREATE DATABASE objekt_trade;'
          PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d postgres -c 'CREATE DATABASE objekt_indexer;'

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
