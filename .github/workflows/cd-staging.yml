name: CD Staging

on:
  push:
    branches:
      - testing

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/objekt-trade-staging
            git fetch origin
            git reset --hard origin/testing
            docker compose -p objekt-staging -f docker-compose.yml -f docker-compose.staging.yml build
            docker compose -p objekt-staging -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans --force-recreate
