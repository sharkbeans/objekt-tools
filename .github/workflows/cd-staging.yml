name: CD Staging

on:
  push:
    branches:
      - testing

concurrency:
  group: cd-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/objekt-trade-staging
            git fetch origin
            git reset --hard origin/testing
            docker ps -a \
              --filter "label=com.docker.compose.project=objekt-staging" \
              --format '{{.ID}} {{.Names}}' \
              | awk '$2 ~ /^[0-9a-f]{12}_objekt-staging-/ { print $1 }' \
              | xargs -r docker rm -f
            docker compose -p objekt-staging -f docker-compose.staging.yml up -d --build --remove-orphans
