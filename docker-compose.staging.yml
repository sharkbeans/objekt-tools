# Standalone staging compose — does not inherit from docker-compose.yml.
# Run with: docker compose -p objekt-staging -f docker-compose.staging.yml up -d --build

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: objekt_trade
      MIRROR_POSTGRES_DB: ${MIRROR_POSTGRES_DB:-indexer_mirror}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d objekt_trade"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # See docker-compose.yml for the full explanation. Profile-gated (not
  # started by a plain `docker compose up`); cut over by setting
  # INDEXER_UPSTREAM_* and pointing INDEXER_DATABASE_URL at
  # indexer-pgbouncer:5432, then starting with
  # `--profile indexer-bouncer`. See docs/plans/indexer-pgbouncer-sidecar.md.
  indexer-pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    profiles: ["indexer-bouncer"]
    environment:
      DB_HOST: ${INDEXER_UPSTREAM_HOST:-}
      DB_PORT: ${INDEXER_UPSTREAM_PORT:-5432}
      DB_USER: ${INDEXER_UPSTREAM_USER:-}
      DB_PASSWORD: ${INDEXER_UPSTREAM_PASSWORD:-}
      DB_NAME: ${INDEXER_UPSTREAM_DB:-}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "8"
      MIN_POOL_SIZE: "2"
      RESERVE_POOL_SIZE: "2"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_TLS_SSLMODE: ${INDEXER_UPSTREAM_SSLMODE:-prefer}
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      SERVER_LIFETIME: "180"
      SERVER_IDLE_TIMEOUT: "60"
      QUERY_WAIT_TIMEOUT: "10"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      COSMO_KEY: ${COSMO_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      INDEXER_DATABASE_URL: ${INDEXER_DATABASE_URL:-}
      MIRROR_DATABASE_URL: ${MIRROR_DATABASE_URL:-}
      INDEXER_UPSTREAM_HOST: ${INDEXER_UPSTREAM_HOST:-}
      INDEXER_UPSTREAM_PORT: ${INDEXER_UPSTREAM_PORT:-}
      REMBG_SERVICE_URL: ${REMBG_SERVICE_URL:-http://rembg:7000}
      REMBG_MODEL: ${REMBG_MODEL:-u2net_human_seg}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-}
      CRON_SECRET: ${CRON_SECRET:-}
    ports:
      - "127.0.0.1:3002:3000"

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
      APP_URL: http://app:3000
    command:
      - /bin/sh
      - -c
      - |
        cat <<'EOF' | crontab -
        0 2 * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/expire-trades
        */15 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/prune-stale-haves
        */2 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/refresh-cosmo-token
        */2 * * * * wget -qO- --header="Authorization: Bearer $$CRON_SECRET" $$APP_URL/api/cron/sync-indexer
        EOF
        exec crond -f -l 2

volumes:
  pgdata:
  redisdata:
